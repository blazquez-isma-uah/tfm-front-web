name: Deploy Frontend — S3 + CloudFront

# Se ejecuta en cada push a main
on:
  push:
    branches:
      - main

# Permisos necesarios para OIDC:
# - id-token: write  → permite que el job solicite un token OIDC a GitHub
# - contents: read   → permite hacer checkout del código
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build y despliegue en AWS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Build de producción
        run: npm run build

      # OIDC: GitHub solicita credenciales temporales a AWS asumiendo el rol.
      # No hay Access Keys almacenadas en ningún sitio.
      - name: Configurar credenciales AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      # --delete elimina de S3 los ficheros que ya no existen en dist/
      - name: Subir bundle a S3
        run: aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }} --delete

      # Necesario después de cada despliegue para que CloudFront sirva
      # los ficheros nuevos y no los que tiene en caché
      - name: Invalidar caché de CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"