server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip para JS/CSS — mejora el tiempo de carga
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    # Proxy hacia el gateway — replica exactamente lo que hace
    # el proxy de Vite en desarrollo (vite.config.ts)
    location /api/ {
        proxy_pass http://gateway:8080/api/; # http://gateway:8080 es el nombre del servicio backend en Docker Compose
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # React Router - cualquier ruta no estática que no sean /api/ redirige a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agresiva para los assets compilados por Vite
    # Vite genera nombres con hash (main.a3f2b1.js) que cambian 
    # con cada build, por lo que son seguros para cachear indefinidamente
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}